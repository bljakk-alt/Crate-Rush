<svg width="100%" viewBox="0 0 1080 1420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#6f7378" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-size: 24px; font-weight: 650; fill: #18202a; }
      .subtitle { font-size: 12px; fill: #5d6672; }
      .layer { font-size: 12px; fill: #6f7378; font-weight: 650; }
      .boxTitle { font-size: 14px; font-weight: 650; }
      .boxText { font-size: 11px; }
      .small { font-size: 10px; }
      .noteTitle { font-size: 13px; font-weight: 650; fill: #28313d; }
      .note { font-size: 11px; fill: #435060; }
      .arrow { stroke: #9aa0a6; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .softArrow { stroke: #c0c5cc; stroke-width: 1.1; fill: none; marker-end: url(#arrow); stroke-dasharray: 5 4; }
      .blocked { stroke: #c54b4b; stroke-width: 1.2; fill: none; stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect x="0" y="0" width="1080" height="1420" fill="#f7f8fa"/>
  <text x="540" y="34" text-anchor="middle" class="title">CrateRush - current target architecture v5</text>
  <text x="540" y="56" text-anchor="middle" class="subtitle">MD is the source of truth. Update design before code when a change would violate the rules.</text>

  <!-- Contract -->
  <text x="90" y="104" text-anchor="end" class="layer">contract</text>
  <rect x="120" y="78" width="860" height="76" rx="8" fill="#fff6dd" stroke="#b88219" stroke-width="1"/>
  <text x="550" y="105" text-anchor="middle" class="boxTitle" fill="#73500d">Architecture gate</text>
  <text x="550" y="126" text-anchor="middle" class="boxText" fill="#8b6314">Every future code change must match DOCS/architecture/CrateRush_Architecture_Rules_v5.md.</text>
  <text x="550" y="143" text-anchor="middle" class="boxText" fill="#8b6314">Open work is tracked in TODO files. Debug is temporarily excluded from violation checks.</text>

  <!-- Bootstrap -->
  <text x="90" y="215" text-anchor="end" class="layer">bootstrap</text>
  <rect x="120" y="188" width="860" height="66" rx="8" fill="#e2f4ed" stroke="#19715a" stroke-width="1"/>
  <text x="550" y="215" text-anchor="middle" class="boxTitle" fill="#0b5947">main.lua</text>
  <text x="550" y="236" text-anchor="middle" class="boxText" fill="#19715a">Load order, module init, slash commands, top-level wiring only</text>

  <!-- Utilities / Static / Config -->
  <text x="90" y="326" text-anchor="end" class="layer">utils/static/config</text>
  <rect x="120" y="290" width="160" height="82" rx="8" fill="#f7e9f0" stroke="#9d4564"/>
  <text x="200" y="319" text-anchor="middle" class="boxTitle" fill="#71314a">locale</text>
  <text x="200" y="339" text-anchor="middle" class="boxText" fill="#9d4564">String tables only</text>
  <text x="200" y="356" text-anchor="middle" class="small" fill="#9d4564">No runtime decisions</text>

  <rect x="295" y="290" width="160" height="82" rx="8" fill="#e4f2dc" stroke="#4e7920"/>
  <text x="375" y="319" text-anchor="middle" class="boxTitle" fill="#315b13">constants</text>
  <text x="375" y="339" text-anchor="middle" class="boxText" fill="#4e7920">States, events, factions</text>
  <text x="375" y="356" text-anchor="middle" class="small" fill="#4e7920">Named values only</text>

  <rect x="470" y="290" width="160" height="82" rx="8" fill="#e4f2dc" stroke="#4e7920"/>
  <text x="550" y="319" text-anchor="middle" class="boxTitle" fill="#315b13">gamedata</text>
  <text x="550" y="339" text-anchor="middle" class="boxText" fill="#4e7920">Zones, vignettes, routes</text>
  <text x="550" y="356" text-anchor="middle" class="small" fill="#4e7920">Expansion and model data</text>

  <rect x="645" y="290" width="160" height="82" rx="8" fill="#e7f0fb" stroke="#286da8"/>
  <text x="725" y="319" text-anchor="middle" class="boxTitle" fill="#174f82">config gateway / db</text>
  <text x="725" y="339" text-anchor="middle" class="boxText" fill="#286da8">config:get/set</text>
  <text x="725" y="356" text-anchor="middle" class="small" fill="#286da8">Prefs through db</text>

  <rect x="820" y="290" width="160" height="82" rx="8" fill="#e9f5f7" stroke="#2b7c8e"/>
  <text x="900" y="319" text-anchor="middle" class="boxTitle" fill="#185b69">utils/clock</text>
  <text x="900" y="339" text-anchor="middle" class="boxText" fill="#2b7c8e">Server time source</text>
  <text x="900" y="356" text-anchor="middle" class="small" fill="#2b7c8e">No domain truth</text>

  <!-- Input -->
  <text x="90" y="456" text-anchor="end" class="layer">input</text>
  <rect x="120" y="424" width="260" height="78" rx="8" fill="#fff0dc" stroke="#bc7825"/>
  <text x="250" y="452" text-anchor="middle" class="boxTitle" fill="#7c4610">events.lua</text>
  <text x="250" y="472" text-anchor="middle" class="boxText" fill="#99611e">Thin WoW event dispatcher</text>
  <text x="250" y="489" text-anchor="middle" class="small" fill="#99611e">No decisions beyond dispatch</text>

  <rect x="410" y="424" width="260" height="78" rx="8" fill="#f0eee8" stroke="#68645e"/>
  <text x="540" y="452" text-anchor="middle" class="boxTitle" fill="#353535">comms inbound</text>
  <text x="540" y="472" text-anchor="middle" class="boxText" fill="#68645e">CrateRush protocol messages</text>
  <text x="540" y="489" text-anchor="middle" class="small" fill="#68645e">Token, timer sync, anchors</text>

  <rect x="700" y="424" width="280" height="78" rx="8" fill="#f0eee8" stroke="#68645e"/>
  <text x="840" y="452" text-anchor="middle" class="boxTitle" fill="#353535">feature inputs</text>
  <text x="840" y="472" text-anchor="middle" class="boxText" fill="#68645e">Queue, bounty, enemy hooks</text>
  <text x="840" y="489" text-anchor="middle" class="small" fill="#68645e">Never owns crate truth</text>

  <!-- Domain services -->
  <text x="90" y="640" text-anchor="end" class="layer">domain</text>
  <rect x="120" y="548" width="860" height="202" rx="10" fill="#efedfb" stroke="#5a52b5"/>
  <text x="550" y="575" text-anchor="middle" class="boxTitle" fill="#3d358d">domain services</text>
  <text x="550" y="595" text-anchor="middle" class="boxText" fill="#5a52b5">Interpret game input, resolve player context, confirm shards, own lifecycle/timer/prediction/feature facts</text>

  <rect x="148" y="622" width="155" height="72" rx="7" fill="#dcd9f7" stroke="#5a52b5"/>
  <text x="225" y="647" text-anchor="middle" class="boxTitle" fill="#3d358d">playerContext / scanner</text>
  <text x="225" y="667" text-anchor="middle" class="boxText" fill="#5a52b5">Faction + War Mode</text>
  <text x="225" y="684" text-anchor="middle" class="small" fill="#5a52b5">vignettes + anchors</text>

  <rect x="320" y="622" width="155" height="72" rx="7" fill="#dcd9f7" stroke="#5a52b5"/>
  <text x="397" y="647" text-anchor="middle" class="boxTitle" fill="#3d358d">zone resolver</text>
  <text x="397" y="667" text-anchor="middle" class="boxText" fill="#5a52b5">Allowed zones</text>
  <text x="397" y="684" text-anchor="middle" class="small" fill="#5a52b5">crate zone mapping</text>

  <rect x="492" y="622" width="155" height="72" rx="7" fill="#dcd9f7" stroke="#5a52b5"/>
  <text x="569" y="647" text-anchor="middle" class="boxTitle" fill="#3d358d">shard service</text>
  <text x="569" y="667" text-anchor="middle" class="boxText" fill="#5a52b5">Shard confirmation</text>
  <text x="569" y="684" text-anchor="middle" class="small" fill="#5a52b5">header facts</text>

  <rect x="664" y="622" width="155" height="72" rx="7" fill="#dcd9f7" stroke="#5a52b5"/>
  <text x="741" y="647" text-anchor="middle" class="boxTitle" fill="#3d358d">lifecycle</text>
  <text x="741" y="667" text-anchor="middle" class="boxText" fill="#5a52b5">Crate state machine</text>
  <text x="741" y="684" text-anchor="middle" class="small" fill="#5a52b5">guardian + claimed states</text>

  <rect x="836" y="622" width="130" height="72" rx="7" fill="#dcd9f7" stroke="#5a52b5"/>
  <text x="901" y="647" text-anchor="middle" class="boxTitle" fill="#3d358d">timer services</text>
  <text x="901" y="667" text-anchor="middle" class="boxText" fill="#5a52b5">Active timer facts</text>
  <text x="901" y="684" text-anchor="middle" class="small" fill="#5a52b5">policy + one per zone</text>

  <text x="550" y="724" text-anchor="middle" class="small" fill="#5a52b5">Services: zoneResolver, vignetteScanner, shardService, lifecycle, timerPolicy, timers, transitionGuard, crateCycleAnchor, prediction.</text>
  <text x="550" y="742" text-anchor="middle" class="small" fill="#5a52b5">Feature modules such as queue, bounty, and enemy presence own only feature facts, never crate lifecycle/timer truth.</text>

  <!-- State -->
  <text x="90" y="846" text-anchor="end" class="layer">state</text>
  <rect x="120" y="790" width="420" height="142" rx="10" fill="#e7f0fb" stroke="#286da8"/>
  <text x="330" y="818" text-anchor="middle" class="boxTitle" fill="#174f82">domain state</text>
  <text x="330" y="840" text-anchor="middle" class="boxText" fill="#286da8">Single in-memory source of current truth</text>
  <text x="150" y="868" class="boxText" fill="#286da8">recordsByZoneShard[zone:shard] = observation/state</text>
  <text x="150" y="890" class="boxText" fill="#286da8">currentShardByZone[zone] = shard</text>
  <text x="150" y="912" class="boxText" fill="#286da8">activeTimerByZone and activeLifecycleByZone</text>

  <rect x="580" y="790" width="400" height="142" rx="10" fill="#e7f0fb" stroke="#286da8"/>
  <text x="780" y="818" text-anchor="middle" class="boxTitle" fill="#174f82">storage db</text>
  <text x="780" y="840" text-anchor="middle" class="boxText" fill="#286da8">Only SavedVariables gateway</text>
  <text x="610" y="868" class="boxText" fill="#286da8">crate history by zoneID + shardID</text>
  <text x="610" y="890" class="boxText" fill="#286da8">zone shard records, settings, migrations</text>
  <text x="610" y="912" class="boxText" fill="#286da8">defaults, validation, migration, persisted data only</text>

  <!-- Boundary -->
  <text x="90" y="1040" text-anchor="end" class="layer">boundary</text>
  <rect x="120" y="980" width="860" height="122" rx="10" fill="#e8f4f6" stroke="#157080"/>
  <text x="550" y="1008" text-anchor="middle" class="boxTitle" fill="#0b5360">domain event bus / state publisher</text>
  <text x="550" y="1030" text-anchor="middle" class="boxText" fill="#157080">Domain updates state/storage first, then publishes finalized facts. Outputs subscribe.</text>
  <text x="165" y="1055" class="boxText" fill="#157080">zoneShardStatusChanged, currentZoneShardChanged, crateStateChanged, crateSightingSeen</text>
  <text x="165" y="1074" class="boxText" fill="#157080">activeTimerChanged, activeTimerRemoved, timerRemovalRequested, timerSyncReceived</text>
  <text x="165" y="1093" class="boxText" fill="#157080">predictionUpdated, predictionCleared, playerContextChanged, configChanged, syncRequested, notificationRequested</text>

  <!-- Outputs -->
  <text x="90" y="1214" text-anchor="end" class="layer">outputs</text>
  <rect x="120" y="1150" width="190" height="98" rx="8" fill="#faece7" stroke="#9d4327"/>
  <text x="215" y="1178" text-anchor="middle" class="boxTitle" fill="#733019">UI / config</text>
  <text x="215" y="1199" text-anchor="middle" class="boxText" fill="#9d4327">Model/actions/theme</text>
  <text x="215" y="1218" text-anchor="middle" class="boxText" fill="#9d4327">Renders prepared state</text>
  <text x="215" y="1236" text-anchor="middle" class="small" fill="#9d4327">Config via gateway</text>

  <rect x="330" y="1150" width="190" height="98" rx="8" fill="#faece7" stroke="#9d4327"/>
  <text x="425" y="1178" text-anchor="middle" class="boxTitle" fill="#733019">timerbars</text>
  <text x="425" y="1199" text-anchor="middle" class="boxText" fill="#9d4327">Displays active timers</text>
  <text x="425" y="1218" text-anchor="middle" class="boxText" fill="#9d4327">No timer decisions</text>
  <text x="425" y="1236" text-anchor="middle" class="small" fill="#9d4327">Remove via uiActions</text>

  <rect x="540" y="1150" width="190" height="98" rx="8" fill="#efedfb" stroke="#5a52b5"/>
  <text x="635" y="1178" text-anchor="middle" class="boxTitle" fill="#3d358d">announcements</text>
  <text x="635" y="1199" text-anchor="middle" class="boxText" fill="#5a52b5">templates, router, sinks</text>
  <text x="635" y="1218" text-anchor="middle" class="boxText" fill="#5a52b5">chat, warning, party/raid</text>
  <text x="635" y="1236" text-anchor="middle" class="small" fill="#5a52b5">addon sink optional</text>

  <rect x="750" y="1150" width="230" height="98" rx="8" fill="#f0eee8" stroke="#68645e"/>
  <text x="865" y="1178" text-anchor="middle" class="boxTitle" fill="#353535">outbound comms</text>
  <text x="865" y="1199" text-anchor="middle" class="boxText" fill="#68645e">Protocol management</text>
  <text x="865" y="1218" text-anchor="middle" class="boxText" fill="#68645e">Token and timer sync</text>
  <text x="865" y="1236" text-anchor="middle" class="small" fill="#68645e">Never owns truth</text>

  <!-- Debug exception and invariants -->
  <rect x="120" y="1280" width="420" height="72" rx="8" fill="#f0eee8" stroke="#68645e" stroke-dasharray="6 4"/>
  <text x="330" y="1308" text-anchor="middle" class="boxTitle" fill="#353535">temporary debug exception</text>
  <text x="330" y="1329" text-anchor="middle" class="boxText" fill="#68645e">Ignored for violation checks. One-way observer only.</text>

  <rect x="580" y="1280" width="400" height="72" rx="8" fill="#ffffff" stroke="#d3d7dc"/>
  <text x="780" y="1308" text-anchor="middle" class="boxTitle" fill="#28313d">core invariants</text>
  <text x="780" y="1327" text-anchor="middle" class="boxText" fill="#435060">zone owns one current shard and one active timer</text>
  <text x="780" y="1345" text-anchor="middle" class="small" fill="#435060">UI and feature modules consume prepared facts only</text>

  <!-- Arrows -->
  <path class="arrow" d="M550 154 L550 185"/>
  <path class="arrow" d="M550 254 L550 287"/>
  <path class="arrow" d="M250 502 L300 548"/>
  <path class="arrow" d="M540 502 L550 548"/>
  <path class="arrow" d="M840 502 L740 548"/>
  <path class="arrow" d="M550 750 L450 788"/>
  <path class="arrow" d="M550 750 L705 788"/>
  <path class="arrow" d="M330 932 L435 980"/>
  <path class="arrow" d="M780 932 L665 980"/>
  <path class="arrow" d="M550 1102 L215 1148"/>
  <path class="arrow" d="M550 1102 L425 1148"/>
  <path class="arrow" d="M550 1102 L635 1148"/>
  <path class="arrow" d="M550 1102 L865 1148"/>
  <path class="softArrow" d="M450 1102 L330 1277"/>

  <!-- Blocked direct-call note -->
  <path class="blocked" d="M710 650 C1035 680 1035 1090 865 1145"/>
  <text x="905" y="762" class="small" fill="#a23d3d">No direct domain to output calls</text>
</svg>
